name: Keep Alive

on:
  # schedule:
  #   - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping staging
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.RENDER_URL }}/liveness")
          echo "Response: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: liveness check returned $STATUS"
          fi
